services:
  frontend:
    build: ./frontend
    container_name: nextjs-app
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://backend:8080"
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: springboot-api
    ports:
      - "8080:8080"
    environment:
      # For NEON Postgres:
      SPRING_DATASOURCE_URL: jdbc:postgresql://<neon-host>/<db>
      SPRING_DATASOURCE_USERNAME: <user>
      SPRING_DATASOURCE_PASSWORD: <password>

      # If using MongoDB instead:
      # SPRING_DATA_MONGODB_URI: mongodb+srv://<user>:<password>@cluster.mongodb.net/<db>
